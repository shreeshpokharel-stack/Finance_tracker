<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Transaction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #1e293b,
        #0f172a
    );
}

.transaction-box{

    width:500px;

    background:white;

    padding:40px;

    border-radius:25px;

    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.title{
    text-align:center;
    margin-bottom:30px;
}

.btn-save{
    width:100%;
    padding:12px;
}

.back-btn{
    width:100%;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="transaction-box">

    <div class="title">

        <h2>💰 Add Transaction</h2>

        <p class="text-muted">
            Track your finances professionally
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Amount
            </label>

            <input
                type="number"
                step="0.01"
                class="form-control"
                name="amount"
                placeholder="Enter amount"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Category
            </label>

            <select
                class="form-select"
                name="category">

                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Entertainment</option>
                <option>Other</option>

            </select>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Transaction Type
            </label>

            <select
                class="form-select"
                name="type">

                <option>Income</option>
                <option>Expense</option>

            </select>

        </div>

        <button
            class="btn btn-success btn-save">

            Save Transaction

        </button>

    </form>

    <a
        href="/dashboard"
        class="btn btn-outline-dark back-btn">

        Back to Dashboard

    </a>

</div>

</body>
</html>
