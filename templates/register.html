<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>FinTrack Pro - Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#2563eb,#7c3aed);
        }

        .login-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,.2);
        }

        .logo{
            text-align:center;
            margin-bottom:25px;
        }

        .logo h1{
            font-weight:700;
        }

        .btn-login{
            width:100%;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="logo">
        <h1>💰 FinTrack Pro</h1>
        <p>Personal Finance Management</p>
    </div>

    <form method="POST">

        <div class="mb-3">
            <input
                type="text"
                class="form-control"
                name="username"
                placeholder="Username"
                required>
        </div>

        <div class="mb-3">
            <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Password"
                required>
        </div>

        <button class="btn btn-primary btn-login">
            Login
        </button>

    </form>

    <div class="text-center mt-3">
        <a href="/register">Create Account</a>
    </div>

</div>

</body>
</html>
